<!DOCTYPE html>
<!-- Peak.tech — Dew-Drops airdrop web interface. Find your inner dew. -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peak.tech — Dew-Drops | Find your inner dew</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0a0e14;
      --bg-card: #0f1419;
      --bg-elevated: #151b24;
      --dew-cyan: #7fdbc4;
      --dew-mint: #a8e6cf;
      --mist: rgba(127, 219, 196, 0.12);
      --text-primary: #e6edf3;
      --text-secondary: #8b9cad;
      --text-muted: #5c6f82;
      --border: #1e2730;
      --accent: #39c5a8;
      --danger: #f07178;
      --success: #7fdbc4;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --font-sans: 'Outfit', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, var(--mist), transparent),
        radial-gradient(ellipse 60% 40% at 80% 60%, rgba(57, 197, 168, 0.06), transparent);
      pointer-events: none;
      z-index: 0;
    }
    .wrap { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 24px; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--dew-cyan);
    }
    .logo span { color: var(--text-muted); font-weight: 400; }
    nav { display: flex; gap: 12px; align-items: center; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .btn-ghost { background: transparent; color: var(--text-secondary); }
    .btn-ghost:hover { background: var(--mist); color: var(--dew-cyan); }
    .btn-primary {
      background: var(--accent);
      color: var(--bg-deep);
    }
