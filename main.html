<!DOCTYPE html>
<!-- Peak.tech — Dew-Drops airdrop web interface. Find your inner dew. -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peak.tech — Dew-Drops | Find your inner dew</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0a0e14;
      --bg-card: #0f1419;
      --bg-elevated: #151b24;
      --dew-cyan: #7fdbc4;
      --dew-mint: #a8e6cf;
      --mist: rgba(127, 219, 196, 0.12);
      --text-primary: #e6edf3;
      --text-secondary: #8b9cad;
      --text-muted: #5c6f82;
      --border: #1e2730;
      --accent: #39c5a8;
      --danger: #f07178;
      --success: #7fdbc4;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --font-sans: 'Outfit', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, var(--mist), transparent),
        radial-gradient(ellipse 60% 40% at 80% 60%, rgba(57, 197, 168, 0.06), transparent);
      pointer-events: none;
      z-index: 0;
    }
    .wrap { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 24px; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--dew-cyan);
    }
    .logo span { color: var(--text-muted); font-weight: 400; }
    nav { display: flex; gap: 12px; align-items: center; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .btn-ghost { background: transparent; color: var(--text-secondary); }
    .btn-ghost:hover { background: var(--mist); color: var(--dew-cyan); }
    .btn-primary {
      background: var(--accent);
      color: var(--bg-deep);
    }
    .btn-primary:hover { filter: brightness(1.1); box-shadow: 0 0 20px rgba(57, 197, 168, 0.3); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-wallet {
      background: var(--bg-elevated);
      color: var(--dew-cyan);
      border: 1px solid var(--border);
    }
    .btn-wallet:hover { border-color: var(--dew-cyan); background: var(--mist); }
    .hero {
      text-align: center;
      padding: 64px 24px 48px;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--dew-cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 1.15rem;
      color: var(--text-secondary);
      max-width: 520px;
      margin: 0 auto 32px;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }
    .card h2 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--dew-mint);
    }
    .section-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 40px 0 20px;
      color: var(--text-primary);
    }
    .task-list { list-style: none; }
    .task-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding: 16px;
      background: var(--bg-elevated);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .task-item:hover { border-color: var(--dew-cyan); }
    .task-kind {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      padding: 4px 10px;
      background: var(--mist);
      color: var(--dew-cyan);
      border-radius: 6px;
    }
    .task-reward { font-weight: 600; color: var(--success); }
    .task-meta { font-size: 0.9rem; color: var(--text-muted); }
    .status-badge {
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 6px;
      font-weight: 500;
    }
    .status-active { background: rgba(127, 219, 196, 0.2); color: var(--success); }
    .status-ended { background: rgba(92, 111, 130, 0.3); color: var(--text-muted); }
    .status-paused { background: rgba(240, 113, 120, 0.2); color: var(--danger); }
    .connect-panel {
      text-align: center;
      padding: 32px;
      background: var(--bg-elevated);
      border-radius: var(--radius);
      border: 1px dashed var(--border);
    }
    .connect-panel p { color: var(--text-secondary); margin-bottom: 20px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-box {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
    }
    .stat-box .value { font-size: 1.25rem; font-weight: 600; color: var(--dew-cyan); }
    .stat-box .label { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
    .input-group { margin-bottom: 16px; }
    .input-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .input-group input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.9rem;
    }
    .input-group input:focus {
      outline: none;
      border-color: var(--dew-cyan);
      box-shadow: 0 0 0 2px var(--mist);
    }
    .eligibility-result {
      margin-top: 16px;
      padding: 16px;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
    }
    .eligibility-result.eligible { background: rgba(127, 219, 196, 0.15); border: 1px solid var(--success); }
    .eligibility-result.not-eligible { background: rgba(92, 111, 130, 0.2); border: 1px solid var(--border); }
    .footer {
      text-align: center;
      padding: 48px 24px 24px;
      color: var(--text-muted);
      font-size: 0.9rem;
      border-top: 1px solid var(--border);
    }
    .footer a { color: var(--dew-cyan); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .loading { opacity: 0.7; pointer-events: none; }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .hidden { display: none !important; }
    .address-short { font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-muted); }
    @media (max-width: 640px) {
      .hero { padding: 40px 16px 32px; }
      .task-item { flex-direction: column; align-items: flex-start; }
    }
    .about-section { margin: 48px 0; }
    .about-section h3 { font-size: 1.1rem; color: var(--dew-mint); margin-bottom: 8px; }
    .about-section p { color: var(--text-secondary); margin-bottom: 12px; font-size: 0.95rem; }
    .task-kinds-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin: 16px 0;
    }
    .task-kind-pill {
      font-size: 0.8rem;
      padding: 8px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
    }
    .faq-item { margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
    .faq-item h4 { font-size: 1rem; color: var(--text-primary); margin-bottom: 8px; }
    .faq-item p { font-size: 0.9rem; color: var(--text-secondary); }
    .code-block {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
